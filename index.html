<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MODWALLET - Вход</title>
    <!-- Подключаем Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #8a2be2 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .auth-container {
            background: rgba(20, 10, 30, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            border: 2px solid #8a2be2;
            box-shadow: 0 30px 60px rgba(138, 43, 226, 0.6);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-header h1 {
            color: white;
            font-size: 32px;
            text-shadow: 0 0 15px #8a2be2;
        }
        
        .auth-header p {
            color: #b19cd9;
            margin-top: 10px;
        }
        
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: rgba(138, 43, 226, 0.2);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 15px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #8a2be2 0%, #4a0080 100%);
            border-color: transparent;
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #b19cd9;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            background: rgba(30, 20, 40, 0.8);
            border: 2px solid rgba(138, 43, 226, 0.3);
            border-radius: 15px;
            color: white;
            font-size: 16px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #8a2be2;
        }
        
        .auth-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #8a2be2 0%, #4a0080 100%);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(138, 43, 226, 0.5);
        }
        
        .message {
            color: #ff6b6b;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(138, 43, 226, 0.3);
            border-top: 4px solid #8a2be2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>MODWALLET</h1>
            <p>Войди в свой криптокошелек</p>
        </div>
        
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('login')">Вход</button>
            <button class="tab-btn" onclick="switchTab('register')">Регистрация</button>
        </div>
        
        <!-- Форма входа -->
        <div id="login-form" class="auth-form active">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <button class="auth-btn" onclick="handleLogin()">Войти</button>
            <div id="login-message" class="message"></div>
        </div>
        
        <!-- Форма регистрации -->
        <div id="register-form" class="auth-form">
            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" id="reg-username" placeholder="Модекс">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="reg-password" placeholder="••••••••">
            </div>
            <button class="auth-btn" onclick="handleRegister()">Зарегистрироваться</button>
            <div id="register-message" class="message"></div>
        </div>

        <div class="loader" id="loader"></div>
    </div>

    <script>
        // Конфигурация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyA34LZhC9sCYVrsOeyizC-DwOwgOyv9-4s",
            authDomain: "mdwal-36193.firebaseapp.com",
            projectId: "mdwal-36193",
            storageBucket: "mdwal-36193.appspot.com",
            messagingSenderId: "13283522525",
            appId: "1:13283522525:web:1fd2fd526c53c1f3432834"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Проверяем, есть ли уже активная сессия
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Если пользователь уже залогинен, сразу кидаем в кошелек
                window.location.href = 'wallet.html';
            }
        });

        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'block' : 'none';
        }

        // Переключение между вкладками
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.tab-btn').classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }
        
        // Обработка входа
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            if (!email || !password) {
                showMessage('login-message', 'Заполни все поля!', 'error');
                return;
            }

            showLoader(true);
            
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Получаем данные пользователя из Firestore
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();
                
                // Сохраняем данные в localStorage
                localStorage.setItem('currentUser', JSON.stringify({
                    id: userData.customId || user.uid.slice(0, 8).toUpperCase(),
                    username: userData.username || email.split('@')[0],
                    email: email,
                    isAdmin: userData.isAdmin || false
                }));
                
                showMessage('login-message', 'Успешный вход! Перенаправление...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'wallet.html';
                }, 1500);
                
            } catch (error) {
                console.error('Ошибка входа:', error);
                let errorMessage = 'Ошибка входа';
                
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'Пользователь не найден';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'Неверный пароль';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Неверный формат email';
                }
                
                showMessage('login-message', errorMessage, 'error');
            } finally {
                showLoader(false);
            }
        }
        
        // Обработка регистрации
        async function handleRegister() {
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            
            if (!username || !email || !password) {
                showMessage('register-message', 'Заполни все поля!', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('register-message', 'Пароль должен быть минимум 6 символов', 'error');
                return;
            }

            showLoader(true);
            
            try {
                // Создаем пользователя в Firebase Auth
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Генерируем кастомный ID
                const customId = 'MOD-' + Math.random().toString(36).substring(2, 8).toUpperCase();
                
                // Создаем документ пользователя в Firestore
                await db.collection('users').doc(user.uid).set({
                    username: username,
                    email: email,
                    customId: customId,
                    isAdmin: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    balances: {
                        btc: 0,
                        sol: 0,
                        usdt: 100, // Бонус новым пользователям
                        ton: 0,
                        doge: 0,
                        stars: 50
                    }
                });
                
                showMessage('register-message', 'Регистрация успешна! Входи...', 'success');
                
                setTimeout(() => {
                    switchTab('login');
                }, 1500);
                
            } catch (error) {
                console.error('Ошибка регистрации:', error);
                let errorMessage = 'Ошибка регистрации';
                
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'Email уже используется';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Неверный формат email';
                }
                
                showMessage('register-message', errorMessage, 'error');
            } finally {
                showLoader(false);
            }
        }
        
        function showMessage(elementId, text, type) {
            const element = document.getElementById(elementId);
            element.textContent = text;
            element.style.color = type === 'error' ? '#ff6b6b' : '#6bff6b';
        }
    </script>
</body>
</html>
