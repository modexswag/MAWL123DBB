<!DOCTYPE html>
<html>
<head>
    <title>Firebase Test</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body style="background:#1a1a1a; color:white; padding:20px;">
    <h1>Тест Firebase</h1>
    <div id="status">Проверка...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA34LZhC9sCYVrsOeyizC-DwOwgOyv9-4s",
            authDomain: "mdwal-36193.firebaseapp.com",
            projectId: "mdwal-36193",
            storageBucket: "mdwal-36193.appspot.com",
            messagingSenderId: "13283522525",
            appId: "1:13283522525:web:1fd2fd526c53c1f3432834"
        };

        try {
            firebase.initializeApp(firebaseConfig);
            document.getElementById('status').innerHTML = '✅ Firebase инициализирован';
            
            const auth = firebase.auth();
            const db = firebase.firestore();
            
            auth.onAuthStateChanged((user) => {
                if (user) {
                    document.getElementById('status').innerHTML += '<br>✅ Пользователь авторизован: ' + user.email;
                } else {
                    document.getElementById('status').innerHTML += '<br>❌ Нет авторизации';
                }
            });
        } catch (e) {
            document.getElementById('status').innerHTML = '❌ Ошибка: ' + e.message;
        }
    </script>
</body>
</html>
